schema_version: 1

context:
  name: google-cloud-core
  version: 2.5.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 3dc94bdec9d05a31d9f355045ed0f369fbc0d8c665076c734f065d729800f811

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.11.0,<3.0.0
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0

    # grpc extra, more restrictive constraint for python >= 3.14
    - grpcio >=1.75.1,<2.0.0
    - grpcio-status >=1.38.0,<2.0.0
tests:
  - python:
      imports:
        - google.api_core.client_info
        - google.cloud.client
        - google.cloud.environment_vars
        - google.cloud.exceptions
        - google.cloud.operation
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: 'API Client library for Google Cloud: Core Helpers'
  description: This library is not meant to stand-alone. Instead it defines common helpers (e.g. base Client and Connection classes) used by all of the  google-cloud-*.
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-core
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-core
  documentation: https://googleapis.dev/python/google-cloud-core/latest/

extra:
  recipe-maintainers:
    - xylar
    - parthea
    - tswast
